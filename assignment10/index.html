<!DOCTYPE html>
<html>
<head>
    <title>Pull-Down Menu and List Box</title>

    <script>
        // Event Handler Function for Pull-Down Menu
        function showCourse() {
            let course = document.getElementById("course").value;
            document.getElementById("result1").innerHTML =
                "Selected Course: " + course;
        }

        // Event Listener for List Box
        window.onload = function () {
            document.getElementById("city").addEventListener("change", function () {
                let city = this.value;
                document.getElementById("result2").innerHTML =
                    "Selected City: " + city;
            });
        };
    </script>
</head>

<body>

    <h2>Pull-Down Menu Example</h2>

    <!-- Pull-Down Menu -->
    <select id="course" onchange="showCourse()">
        <option value="">Select Course</option>
        <option value="C Programming">C Programming</option>
        <option value="Java">Java</option>
        <option value="Python">Python</option>
    </select>

    <p id="result1"></p>

    <hr>

    <h2>List Box Example with Event Listener</h2>

    <!-- List Box -->
    <select id="city" size="4">
        <option value="Bangalore">Bangalore</option>
        <option value="Mysore">Mysore</option>
        <option value="Mangalore">Mangalore</option>
        <option value="Hubli">Hubli</option>
    </select>

    <p id="result2"></p>

</body>
</html>
